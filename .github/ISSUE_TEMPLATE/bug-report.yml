name: Bug report
description: Something misbehaves — a refused launch, a failed handback, wrong ownership, an unexpected denial.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Suspected security vulnerability?** Do not file it here — use private
        reporting instead (see the [security policy](https://github.com/dag-node/tools-agent-tools-restricted/security/policy)).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you did, what you saw. Paste the exact refusal/error message if there was one (they are designed to be grep-able).
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, SELinux mode, package versions.
      value: |
        - EL release (`cat /etc/os-release | grep -E '^(NAME|VERSION)='`):
        - `getenforce`:
        - `rpm -q ai-tools-base ai-tools-nodejs claude-code-restricted` (or `install.sh` from-source):
      render: markdown
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        journald is the first place to look — e.g. `sudo journalctl -t ai-tools-chown`,
        `-t ai-tools-hook`, `-t ai-tools`, or `ausearch -m avc -ts recent` for SELinux
        denials. Redact anything private.
      render: text
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ai-tools --project-claim ~/proj
        2. cd ~/proj && claude
        3. ...
