name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
  # Manual trigger so the workflow can be exercised from any branch (the podman/systemd
  # container path is runner-sensitive and should be testable without touching develop).
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Never cancel a tag run: a re-tag (the documented recovery for a tag/VERSION
  # mismatch) must not cancel a release publish already in flight for that ref.
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Pin the version the repo's lint baseline is defined against
      # (.claude/rules/shellcheck.rule.md pins 0.10); ubuntu-latest's apt ships 0.9,
      # which reports a different finding set.
      - name: Install ShellCheck 0.10.0
        run: |
          curl -fsSL https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.linux.x86_64.tar.xz \
            | tar -xJ
          sudo install shellcheck-v0.10.0/shellcheck /usr/local/bin/shellcheck
          shellcheck --version

      # Scope matches the documented baseline: src/**/*.sh plus install.sh. tests/,
      # selinux/, and packaging/ scripts are not part of that baseline; extend the scope
      # here and in the rule file together, after verifying each directory lints clean.
      - name: Lint the baseline against the repo's .shellcheckrc
        run: |
          find src -name '*.sh' -print0 | xargs -0 shellcheck
          shellcheck install.sh

  # Builds the four RPMs and runs the full admin -> operator -> agent workflow (bootstrap,
  # operator enrolment, project claim, tests/run.sh all, a confined `claude --version`
  # session) inside a throwaway Rocky container with systemd as PID 1. Mirrors
  # `make -C packaging rpmtest-rockyN` -- see packaging/README.md for what this
  # does and does not cover (no SELinux-enforcing confinement; that still needs an
  # enforcing host, see the docs/rpm-packaging.md manual gate).
  #
  # Every push/PR run builds a dev/snapshot Release (see the comment on Release: in
  # packaging/ai-tools.spec) and uploads the resulting RPMs as a workflow artifact, so a
  # build off any commit is downloadable and inspectable without cutting a real release.
  #
  # OCI="sudo podman": the selftest container runs systemd as PID 1 plus the sandbox
  # account's own `systemd --user` manager, which needs full cgroup delegation; rootless
  # podman on hosted runners does not reliably provide that. The Makefile default stays
  # rootless `podman` for local runs.
  rpm-selftest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        el: ["9", "10"]
    steps:
      - uses: actions/checkout@v7

      - name: Install podman
        run: sudo apt-get update && sudo apt-get install -y podman

      - name: Compute dev Release
        id: relver
        run: echo "release=0.${{ github.run_number }}.git$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: make -C packaging rpmtest-rocky${{ matrix.el }}
        run: make -C packaging rpmtest-rocky${{ matrix.el }} RPM_RELEASE=${{ steps.relver.outputs.release }} OCI="sudo podman"

      # `if: always()` so a failed selftest still surfaces the RPMs that caused it --
      # those are exactly the artifacts needed to debug the failure. The rpmbase image
      # is still cached (only the final test container was --rm'd); when even the image
      # build failed there is nothing to extract, hence the image-exists guard.
      - name: Extract dev RPMs
        if: always()
        run: |
          sudo podman image exists ai-tools-rpmbase:el${{ matrix.el }} || { echo "no image built; nothing to extract"; exit 0; }
          cid=$(sudo podman create ai-tools-rpmbase:el${{ matrix.el }})
          mkdir -p dist-rpms
          sudo podman cp "${cid}":/opt/ai-tools-src/packaging/rpmbuild/RPMS/noarch/. dist-rpms/
          sudo podman rm "${cid}" >/dev/null
          sudo chown -R "$(id -u):$(id -g)" dist-rpms

      - name: Upload dev RPM artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-tools-rpms-el${{ matrix.el }}-${{ steps.relver.outputs.release }}
          path: dist-rpms/*.rpm
          if-no-files-found: ignore
          retention-days: 14

  # Tag-triggered only (push a vX.Y.Z tag once packaging/VERSION is bumped to match). Rebuilds
  # clean release RPMs (RPM_RELEASE unset, so the spec's own default Release "1" applies --
  # deliberately not reusing rpm-selftest's dev-Release artifacts, which are snapshot builds by
  # construction) and publishes them as a GitHub Release with auto-generated notes.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [shellcheck, rpm-selftest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      # Tag-only gate: the tag, packaging/VERSION, and the newest %changelog entry must all
      # name the same version before public RPMs are published. Enforced here rather than on
      # push/PR so a version bump never blocks dev flow -- only a release does. Recovery for
      # a mismatch is to fix VERSION/%changelog and re-tag (see the concurrency note above).
      - name: Verify tag, VERSION, and %changelog agree
        run: bash packaging/check-version.sh "${GITHUB_REF_NAME}"

      - name: Install podman + zip
        run: sudo apt-get update && sudo apt-get install -y podman zip

      - name: Build + extract release RPMs
        run: |
          # rpmbase-elN, not rpmtest-rockyN: the `needs: rpm-selftest` dependency above
          # already ran and passed the full selftest on this exact commit, so re-running it
          # here would only re-prove what's already proven. This step's only remaining job
          # is producing the release artifacts themselves, built clean (RPM_RELEASE unset,
          # so the spec's default Release "1" applies instead of a dev/snapshot one).
          for el in 9 10; do
            make -C packaging rpmbase-el${el} OCI="sudo podman"
            cid=$(sudo podman create ai-tools-rpmbase:el${el})
            mkdir -p "dist-rpms/el${el}"
            sudo podman cp "${cid}":/opt/ai-tools-src/packaging/rpmbuild/RPMS/noarch/. "dist-rpms/el${el}/"
            sudo podman rm "${cid}" >/dev/null
          done
          sudo chown -R "$(id -u):$(id -g)" dist-rpms

      # Sign every release RPM INSIDE the matching-EL build container, so the rpm/gnupg toolchain
      # that signs is the same one that built the packages -- avoids an rpm/macro mismatch with the
      # Ubuntu host (see packaging/sign-rpms.sh and github-org-dag-node/GPG-HINTS.md). The signing
      # key is a step-scoped env var, never baked into an image layer or build cache. Fail-closed
      # per package (sign-rpms.sh verifies each signature and aborts on any that does not check out),
      # but token-gated at the top level: until the org signing key + GPG_SIGNING_KEY secret exist,
      # the release still publishes UNSIGNED with a loud warning rather than hard-failing every
      # release during bring-up. --nogpgcheck stays documented for the unsigned window.
      - name: Sign release RPMs (in-container)
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
        run: |
          if [[ -z "${GPG_SIGNING_KEY}" ]]; then
            echo "::warning::GPG_SIGNING_KEY not set -- publishing UNSIGNED RPMs; set the dag-node org signing key to enable signing (GPG-HINTS.md)"
            exit 0
          fi
          for el in 9 10; do
            sudo podman run --rm \
              -e GPG_SIGNING_KEY -e GPG_SIGNING_PASSPHRASE \
              -v "$(pwd)/dist-rpms/el${el}:/rpms:Z" \
              ai-tools-rpmbase:el${el} bash -c '
                set -euo pipefail
                dnf -y install --setopt=install_weak_deps=False rpm-sign gnupg2 >/dev/null
                bash /opt/ai-tools-src/packaging/sign-rpms.sh /rpms/RPM-GPG-KEY-dag-node /rpms/*.rpm
              '
          done
          sudo chown -R "$(id -u):$(id -g)" dist-rpms

      # Both el9 and el10 RPMs land as flat, same-named-prefix assets on one release page
      # (see the upload below); a per-EL zip removes the "which four files go together"
      # ambiguity that creates -- `dnf install ./*.rpm` after unzipping is then unambiguous
      # by construction, since each archive holds only one EL's four packages. The public key
      # rides inside each zip too (present only when signing ran), so an operator imports it and
      # installs from one archive offline; the canonical repo at rpm.dagnode.com serves it too.
      - name: Bundle per-EL zip archives
        run: |
          for el in 9 10; do
            key=(); [[ -f "dist-rpms/el${el}/RPM-GPG-KEY-dag-node" ]] && key=(RPM-GPG-KEY-dag-node)
            (cd "dist-rpms/el${el}" && zip -j "../ai-tools-el${el}-${GITHUB_REF_NAME}.zip" ./*.rpm "${key[@]}")
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Attach the exported public key too (present only when signing ran), so a manual
          # download can verify without reaching rpm.dagnode.com.
          key_asset=()
          [[ -f dist-rpms/el9/RPM-GPG-KEY-dag-node ]] && key_asset=(dist-rpms/el9/RPM-GPG-KEY-dag-node)
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist-rpms/ai-tools-el9-${GITHUB_REF_NAME}.zip \
            dist-rpms/ai-tools-el10-${GITHUB_REF_NAME}.zip \
            dist-rpms/el9/*.rpm dist-rpms/el10/*.rpm "${key_asset[@]}"

      # Notify the central dag-node/rpm repository to rebuild and publish the signed DNF repo at
      # rpm.dagnode.com from this release. That repo owns the single publish pipeline (createrepo_c
      # + repomd.xml signing + GitHub Pages deploy) and serializes concurrent project releases, so
      # this project never writes the repo directly -- it triggers the pipeline via repository_dispatch
      # (a workflow_call reusable workflow cannot own another repo's Pages deploy: it runs in the
      # caller's context). Best-effort and token-gated: until the org repo + RPM_REPO_DISPATCH_TOKEN
      # exist the release still publishes and the notify is skipped with a warning. The token is a
      # fine-grained PAT/App token with contents:write on dag-node/rpm. See GPG-HINTS.md.
      - name: Notify central RPM repository (rpm.dagnode.com)
        env:
          GH_TOKEN: ${{ secrets.RPM_REPO_DISPATCH_TOKEN }}
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "::warning::RPM_REPO_DISPATCH_TOKEN not set -- skipping dag-node/rpm publish notify"
            exit 0
          fi
          gh api "repos/dag-node/rpm/dispatches" \
            -f "event_type=publish-rpm" \
            -F "client_payload[project]=${GITHUB_REPOSITORY}" \
            -F "client_payload[tag]=${GITHUB_REF_NAME}"
