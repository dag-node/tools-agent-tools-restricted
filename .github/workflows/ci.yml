name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
  # Manual trigger so the workflow can be exercised from any branch (the podman/systemd
  # container path is runner-sensitive and should be testable without touching develop).
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Never cancel a tag run: a re-tag (the documented recovery for a tag/VERSION
  # mismatch) must not cancel a release publish already in flight for that ref.
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Pin the version the repo's lint baseline is defined against
      # (.claude/rules/shellcheck.rule.md pins 0.10); ubuntu-latest's apt ships 0.9,
      # which reports a different finding set.
      - name: Install ShellCheck 0.10.0
        run: |
          curl -fsSL https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.linux.x86_64.tar.xz \
            | tar -xJ
          sudo install shellcheck-v0.10.0/shellcheck /usr/local/bin/shellcheck
          shellcheck --version

      # Scope matches the documented baseline: src/**/*.sh plus install.sh. tests/,
      # selinux/, and packaging/ scripts are not part of that baseline; extend the scope
      # here and in the rule file together, after verifying each directory lints clean.
      - name: Lint the baseline against the repo's .shellcheckrc
        run: |
          find src -name '*.sh' -print0 | xargs -0 shellcheck
          shellcheck install.sh

  # Builds the four RPMs and runs the full admin -> operator -> agent workflow (bootstrap,
  # operator enrolment, project claim, tests/run.sh all, a confined `claude --version`
  # session) inside a throwaway Rocky container with systemd as PID 1. Mirrors
  # `make -C packaging rpmtest-rockyN` -- see packaging/README.md for what this
  # does and does not cover (no SELinux-enforcing confinement; that still needs an
  # enforcing host, see the docs/rpm-packaging.md manual gate).
  #
  # Every push/PR run builds a dev/snapshot Release (see the comment on Release: in
  # packaging/ai-tools.spec) and uploads the resulting RPMs as a workflow artifact, so a
  # build off any commit is downloadable and inspectable without cutting a real release.
  #
  # OCI="sudo podman": the selftest container runs systemd as PID 1 plus the sandbox
  # account's own `systemd --user` manager, which needs full cgroup delegation; rootless
  # podman on hosted runners does not reliably provide that. The Makefile default stays
  # rootless `podman` for local runs.
  rpm-selftest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        el: ["9", "10"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install podman
        run: sudo apt-get update && sudo apt-get install -y podman

      - name: Compute dev Release
        id: relver
        run: echo "release=0.${{ github.run_number }}.git$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: make -C packaging rpmtest-rocky${{ matrix.el }}
        run: make -C packaging rpmtest-rocky${{ matrix.el }} RPM_RELEASE=${{ steps.relver.outputs.release }} OCI="sudo podman"

      # `if: always()` so a failed selftest still surfaces the RPMs that caused it --
      # those are exactly the artifacts needed to debug the failure. The rpmbase image
      # is still cached (only the final test container was --rm'd); when even the image
      # build failed there is nothing to extract, hence the image-exists guard.
      - name: Extract dev RPMs
        if: always()
        run: |
          sudo podman image exists ai-tools-rpmbase:el${{ matrix.el }} || { echo "no image built; nothing to extract"; exit 0; }
          cid=$(sudo podman create ai-tools-rpmbase:el${{ matrix.el }})
          mkdir -p dist-rpms
          sudo podman cp "${cid}":/opt/ai-tools-src/packaging/rpmbuild/RPMS/noarch/. dist-rpms/
          sudo podman rm "${cid}" >/dev/null
          sudo chown -R "$(id -u):$(id -g)" dist-rpms

      - name: Upload dev RPM artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ai-tools-rpms-el${{ matrix.el }}-${{ steps.relver.outputs.release }}
          path: dist-rpms/*.rpm
          if-no-files-found: ignore
          retention-days: 14

  # Release tags publish; workflow_dispatch rehearses the identical build+sign+verify path with
  # the publish steps skipped (tag-gated below). The channel follows the tag, never the branch:
  # vX.Y.Z -> GitHub Release + rpm.dagnode.com, vX.Y.Z-rc.N -> GitHub prerelease only. Process
  # contract: docs/branching-and-release.md. Never runs on pull_request -- fork PRs must not
  # see the signing secret.
  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [shellcheck, rpm-selftest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Tag-only: a rehearsal has no version identity. check-version.sh relaxes the %changelog
      # match for -rc.N tags; recovery for a mismatch is fix VERSION/%changelog and re-tag.
      - name: Verify tag, VERSION, and %changelog agree
        if: startsWith(github.ref, 'refs/tags/v')
        run: bash packaging/check-version.sh "${GITHUB_REF_NAME}"

      # RC tags build with the Fedora prerelease Release 0.rcN (< the final "1", > the previous
      # release); final tags leave it empty. Allowlist: a dashed tag that is not vX.Y.Z-rc.N
      # fails here. A rehearsal gets its own 0.<run>.rehearsal.git<sha> Release: its RPMs are
      # signed with the real key, so they must never share a NEVRA with a publishable release --
      # a leaked rehearsal artifact cannot impersonate the official X.Y.Z-1 package.
      - name: Classify the tag and compute RPM_RELEASE
        id: relmode
        run: |
          prerelease=false rpm_release=""
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
              [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.([0-9]+)$ ]] \
                || { echo "::error::prerelease tag ${GITHUB_REF_NAME} is not vX.Y.Z-rc.N"; exit 1; }
              prerelease=true rpm_release="0.rc${BASH_REMATCH[1]}"
            fi
          else
            rpm_release="0.${GITHUB_RUN_NUMBER}.rehearsal.git$(git rev-parse --short HEAD)"
          fi
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "rpm_release=${rpm_release}" >> "$GITHUB_OUTPUT"

      # Validate the release prerequisites BEFORE building or publishing anything, so a
      # misconfigured secret fails the job while nothing has shipped -- rather than after the
      # GitHub Release is already public, where a hard failure only strands a half-published
      # release. Signing is MANDATORY: every published RPM must carry a verifiable dag-node
      # signature, so a missing or unusable secret fails the release here instead of shipping
      # unsigned. This step proves the key imports with a usable secret and the dispatch token
      # reaches dag-node/rpm; the passphrase and the full rpmsign+verify chain are proven by the
      # in-container selftest below, which also runs before anything is built or published.
      - name: Preflight release prerequisites
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
          RPM_REPO_DISPATCH_TOKEN: ${{ secrets.RPM_REPO_DISPATCH_TOKEN }}
        run: |
          [[ -n "${GPG_SIGNING_KEY}" ]] \
            || { echo "::error::GPG_SIGNING_KEY not set -- releases are signed; set the dag-node org signing key (GPG-HINTS.md)"; exit 1; }
          [[ -n "${GPG_SIGNING_PASSPHRASE}" ]] \
            || { echo "::error::GPG_SIGNING_PASSPHRASE not set -- the org signing key is passphrase-protected (GPG-HINTS.md)"; exit 1; }
          [[ -n "${RPM_REPO_DISPATCH_TOKEN}" ]] \
            || { echo "::error::RPM_REPO_DISPATCH_TOKEN not set -- required to publish the signed repo at rpm.dagnode.com (GPG-HINTS.md)"; exit 1; }

          # gpg must import into a keyring DIRECTORY to verify a usable secret key. Keep it on
          # tmpfs (/dev/shm, RAM) so the key never lands on persistent disk, and wipe on exit --
          # mirrors packaging/sign-rpms.sh. The key text arrives on stdin, never a temp file.
          gnupghome="$(mktemp -d -p /dev/shm 2>/dev/null || mktemp -d)"
          trap 'rm -rf "${gnupghome}"' EXIT
          printf '%s\n' "${GPG_SIGNING_KEY}" | GNUPGHOME="${gnupghome}" gpg --batch --quiet --import \
            || { echo "::error::GPG_SIGNING_KEY did not import -- it is not a usable ASCII-armored key (GPG-HINTS.md)"; exit 1; }
          GNUPGHOME="${gnupghome}" gpg --batch --with-colons --list-secret-keys | grep -q '^sec:' \
            || { echo "::error::GPG_SIGNING_KEY carries no secret key -- set the signing-subkey export, gpg --export-secret-subkeys '<subkey-fpr>!' (GPG-HINTS.md)"; exit 1; }

          # Surface the HTTP status so an operator can tell a bad token (401) from a missing
          # grant/repo (403/404) at a glance -- gh prints "(HTTP NNN)" on stderr.
          if ! resp="$(GH_TOKEN="${RPM_REPO_DISPATCH_TOKEN}" gh api repos/dag-node/rpm --jq .full_name 2>&1)"; then
            echo "::error::RPM_REPO_DISPATCH_TOKEN cannot reach dag-node/rpm: ${resp} -- invalid, expired, or lacking access; fix it before releasing (GPG-HINTS.md)"
            exit 1
          fi

      - name: Install podman + zip + rpm
        run: sudo apt-get update && sudo apt-get install -y podman zip rpm

      # Build the matching-EL images once, up front. Both the signing selftest below and the
      # release-RPM extraction reuse these cached images, so nothing is built twice. rpmbase-elN,
      # not rpmtest-rockyN: the `needs: rpm-selftest` dependency above already ran and passed the
      # full selftest on this exact commit.
      - name: Build EL RPM images
        run: |
          for el in 9 10; do
            make -C packaging rpmbase-el${el} OCI="sudo podman" RPM_RELEASE="${{ steps.relmode.outputs.rpm_release }}"
          done

      # Prove the ENTIRE signing chain -- key, passphrase, rpmsign, and signature verification --
      # on a throwaway RPM inside each matching-EL container, BEFORE any release RPM is built or
      # published. A wrong passphrase or a container where rpmsign silently no-ops (the 0.6.1
      # failure mode) fails the job here, while nothing is public. The signing key is a step-scoped
      # env var, never baked into an image layer or build cache.
      # --entrypoint bypasses the image's /sbin/init (a bare command is ignored init arguments --
      # the container would boot the selftest instead); the assertion proves sign-rpms.sh ran.
      - name: Prove the signing chain end-to-end (in-container)
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
        run: |
          set -euo pipefail
          for el in 9 10; do
            out="$(sudo podman run --rm \
              -e GPG_SIGNING_KEY -e GPG_SIGNING_PASSPHRASE \
              --entrypoint /usr/bin/bash \
              ai-tools-rpmbase:el${el} \
              /opt/ai-tools-src/packaging/sign-rpms.sh --selftest)"
            printf '%s\n' "${out}"
            grep -q -- '--selftest OK' <<<"${out}" \
              || { echo "::error::el${el}: sign-rpms.sh --selftest did not run -- its success line is absent"; exit 1; }
          done

      # Sign the RPMs the image built INSIDE the matching-EL container, so the rpm/gnupg toolchain
      # that signs matches the one that built them (see packaging/sign-rpms.sh), then copy the
      # SIGNED RPMs out with `podman cp`. --entrypoint overrides the image's /sbin/init -- a bare
      # command is ignored init arguments, and the container would boot the selftest and power off
      # "successfully" without signing. The success-line assertion pins the workload; the runner
      # re-verify in the next step is the fail-closed backstop. sign-rpms.sh writes its own verify
      # public key to a container-local path; the PUBLISHED key is exported on the runner below.
      - name: Sign and extract release RPMs (in-container)
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
        run: |
          set -euo pipefail
          rpmdir=/opt/ai-tools-src/packaging/rpmbuild/RPMS/noarch
          for el in 9 10; do
            mkdir -p "dist-rpms/el${el}"
            cid="$(sudo podman create -e GPG_SIGNING_KEY -e GPG_SIGNING_PASSPHRASE \
              --entrypoint /usr/bin/bash \
              ai-tools-rpmbase:el${el} -c '
                bash /opt/ai-tools-src/packaging/sign-rpms.sh /tmp/pubkey.asc \
                  /opt/ai-tools-src/packaging/rpmbuild/RPMS/noarch/*.rpm
              ')"
            out="$(sudo podman start --attach "${cid}")"
            printf '%s\n' "${out}"
            grep -q 'signed and verified' <<<"${out}" \
              || { echo "::error::el${el}: sign-rpms.sh did not run in the sign container"; exit 1; }
            sudo podman cp "${cid}:${rpmdir}/." "dist-rpms/el${el}/"
            sudo podman rm "${cid}" >/dev/null
          done
          sudo chown -R "$(id -u):$(id -g)" dist-rpms

      # Export the published public key on the runner, straight from the signing secret, and
      # verify every RPM against it here -- rather than trusting a file the container wrote into
      # the bind mount to surface on the runner (the v0.6.2 failure: the container-written key was
      # absent at release time). The key is public; the private key is imported into a tmpfs
      # (/dev/shm, RAM) keyring wiped on exit, never persistent disk. If the in-container signing
      # did not actually reach the runner filesystem, the verification below fails closed instead
      # of publishing unsigned packages.
      - name: Export the public key and verify signatures on the runner
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        run: |
          set -euo pipefail
          gnupghome="$(mktemp -d -p /dev/shm 2>/dev/null || mktemp -d)"
          trap 'rm -rf "${gnupghome}"' EXIT
          printf '%s\n' "${GPG_SIGNING_KEY}" | GNUPGHOME="${gnupghome}" gpg --batch --quiet --import
          fpr="$(GNUPGHOME="${gnupghome}" gpg --batch --with-colons --list-secret-keys \
                  | awk -F: '$1 == "fpr" { print $10; exit }')"
          [[ -n "${fpr}" ]] || { echo "::error::no secret key after import"; exit 1; }
          GNUPGHOME="${gnupghome}" gpg --batch --armor --export "${fpr}" > dist-rpms/RPM-GPG-KEY-dag-node
          [[ -s dist-rpms/RPM-GPG-KEY-dag-node ]] || { echo "::error::exported public key is empty"; exit 1; }

          # Verify against a throwaway rpmdb seeded only with the exported key. Require a validating
          # signature LINE (rpmkeys -Kv), not just a zero exit -- an unsigned package exits 0.
          verifydb="$(mktemp -d)"
          rpmkeys --dbpath "${verifydb}" --import dist-rpms/RPM-GPG-KEY-dag-node
          for rpm in dist-rpms/el9/*.rpm dist-rpms/el10/*.rpm; do
            rpmkeys --dbpath "${verifydb}" -Kv "${rpm}" 2>&1 \
              | grep -Eqi 'signature[^:]*:[[:space:]]*OK' \
              || { echo "::error::${rpm} is not signed on the runner -- the in-container signing did not persist to the host"; exit 1; }
          done
          echo "verified $(find dist-rpms -name '*.rpm' | wc -l) signed RPM(s) on the runner"

      # Both el9 and el10 RPMs land as flat, same-named-prefix assets on one release page
      # (see the upload below); a per-EL zip removes the "which four files go together"
      # ambiguity that creates -- `dnf install ./*.rpm` after unzipping is then unambiguous
      # by construction, since each archive holds only one EL's four packages. The runner-exported
      # public key (dist-rpms/RPM-GPG-KEY-dag-node) rides inside each zip too, so an operator imports
      # it and installs from one archive offline; rpm.dagnode.com serves it too.
      - name: Bundle per-EL zip archives
        run: |
          ref="${GITHUB_REF_NAME//\//-}"   # a rehearsal ref can be a branch with slashes
          for el in 9 10; do
            (cd "dist-rpms/el${el}" && zip -j "../ai-tools-el${el}-${ref}.zip" ./*.rpm ../RPM-GPG-KEY-dag-node)
          done

      # Uploaded before the publish steps, so a rehearsal's signed output is inspectable and a
      # failed publish still leaves the verified RPMs downloadable.
      - name: Upload signed RPMs as a workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ai-tools-signed-rpms
          path: dist-rpms/
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ steps.relmode.outputs.prerelease }}
        run: |
          # Attach the runner-exported public key too, so a manual download can verify without
          # reaching rpm.dagnode.com. It was produced + checked in the verify step above.
          assets=(
            dist-rpms/ai-tools-el9-${GITHUB_REF_NAME}.zip
            dist-rpms/ai-tools-el10-${GITHUB_REF_NAME}.zip
            dist-rpms/el9/*.rpm dist-rpms/el10/*.rpm
            dist-rpms/RPM-GPG-KEY-dag-node
          )
          # Idempotent: if a later step (e.g. the publish-notify) failed and this workflow is
          # re-run, creating the release again would fail on the already-present tag. Refresh the
          # existing release's assets instead, so re-running the workflow recovers on its own
          # rather than needing a hand-built release.
          flags=(--title "${GITHUB_REF_NAME}" --generate-notes --verify-tag)
          if [[ "${PRERELEASE}" == "true" ]]; then
            flags+=(--prerelease)
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload --clobber "${GITHUB_REF_NAME}" "${assets[@]}"
          else
            gh release create "${GITHUB_REF_NAME}" "${flags[@]}" "${assets[@]}"
          fi

      # Notify the central dag-node/rpm repository to rebuild and publish the signed DNF repo at
      # rpm.dagnode.com from this release. That repo owns the single publish pipeline (createrepo_c
      # + repomd.xml signing + GitHub Pages deploy) and serializes concurrent project releases, so
      # this project never writes the repo directly -- it triggers the pipeline via repository_dispatch
      # (a workflow_call reusable workflow cannot own another repo's Pages deploy: it runs in the
      # caller's context). The token (a fine-grained PAT/App token with contents:write on
      # dag-node/rpm, see GPG-HINTS.md) is required and already vetted in preflight, so this step
      # only handles a transient dispatch failure.
      # Final tags only: dag-node/rpm serves ^vX.Y.Z$ tags, so notifying on an -rc tag would
      # rebuild the repo just to drop the RC. RCs ship as GitHub prerelease assets.
      - name: Notify central RPM repository (rpm.dagnode.com)
        if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
        env:
          GH_TOKEN: ${{ secrets.RPM_REPO_DISPATCH_TOKEN }}
        run: |
          # Preflight already vetted the token, so a failure here is transient (a registry blip on
          # dag-node/rpm's side). Retry with backoff rather than degrading to a hand-built dispatch.
          # If it still fails, fail the job: the release is idempotent (see Create GitHub Release),
          # so re-running this workflow re-fires the notify and completes the publish -- no manual
          # step.
          attempts=5
          for attempt in $(seq 1 "${attempts}"); do
            if gh api "repos/dag-node/rpm/dispatches" \
                  -f "event_type=publish-rpm" \
                  -F "client_payload[project]=${GITHUB_REPOSITORY}" \
                  -F "client_payload[tag]=${GITHUB_REF_NAME}"; then
              exit 0
            fi
            if [[ "${attempt}" -lt "${attempts}" ]]; then
              echo "publish-notify attempt ${attempt}/${attempts} failed; retrying in $((attempt * 10))s" >&2
              sleep $((attempt * 10))
            fi
          done
          echo "::error::publish-notify to dag-node/rpm failed after ${attempts} attempts -- re-run this workflow to retry (the release is idempotent, so nothing is duplicated)." >&2
          exit 1
