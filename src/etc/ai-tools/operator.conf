# /etc/ai-tools/operator.conf -- ai-tools host configuration.
# Parsed line by line as KEY="value" pairs, never sourced. Root-write-only,
# world-readable (carries no secrets).

# The login users whose projects the sandbox works on. Managed in place by
# `ai-tools-admin operator add|remove`; read at runtime by the root helpers and the
# agent hooks (resolver: /usr/local/lib/ai-tools/operator.lib.sh).
OPERATORS="@PROJECTS_USER@"

# Directory names omitted from the helper walks (handback sweeps, claim normalization,
# secret lockdown). Space-separated; a set key REPLACES that category's default. Full
# reference, defaults, and semantics: /usr/local/lib/ai-tools/skip-dirs.lib.sh.
# Defaults shown commented; SKIP_ARTIFACT_DIRS ships empty -- its line shows candidate
# values (a skipped tree is not handed back, so skip build output only where walking it
# is a real cost, and exempt any same-named source dir via the relative exclusions).
#SKIP_VCS_DIRS=".git"
#SKIP_PACKAGE_DIRS="node_modules .venv packages"
#SKIP_ARTIFACT_DIRS="bin obj"
#SKIP_ARTIFACT_DIRS_EXCLUDED_PATHS_RELATIVE="src/usr/local/bin src/opt/ai-tools/bin"
#SKIP_CACHE_DIRS="__pycache__"
